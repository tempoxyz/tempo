[package]
name = "tempo-transaction-pool-fuzz"
version = "0.0.0"
edition = "2024"
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
tempo-transaction-pool = { path = "..", features = ["fuzzing"] }
tempo-chainspec = { path = "../../chainspec" }

reth-transaction-pool = { git = "https://github.com/paradigmxyz/reth", rev = "a0b0d88", features = ["test-utils"] }
reth-primitives-traits = { git = "https://github.com/paradigmxyz/reth", rev = "a0b0d88" }

alloy-primitives = "1.5.7"
alloy-consensus = "1.6.1"

libfuzzer-sys = "0.4"
arbitrary = { version = "1", features = ["derive"] }

[workspace]

# Fuzz targets
[[bin]]
name = "merge_best_ordering"
path = "fuzz_targets/merge_best_ordering.rs"
doc = false

[[bin]]
name = "aa2d_state_machine"
path = "fuzz_targets/aa2d_state_machine.rs"
doc = false

[[bin]]
name = "paused_fee_token_pool"
path = "fuzz_targets/paused_fee_token_pool.rs"
doc = false
