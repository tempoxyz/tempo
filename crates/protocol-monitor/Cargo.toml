[package]
name = "protocol-monitor"
description = "Tempo protocol monitor core and Reth adapter"

version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true
publish.workspace = true

[lints]
workspace = true

[features]
default = []
store = []
reth = ["store"]
activity = []

[dependencies]
alloy-consensus = { workspace = true, features = ["serde"] }
alloy-eips = { workspace = true, features = ["serde"] }
alloy-primitives = { workspace = true, features = ["serde"] }
tempo-contracts = { workspace = true, default-features = false, features = ["serde"] }
tempo-hardfork = { workspace = true, features = ["serde"] }
tempo-primitives = { workspace = true, default-features = false, features = ["std", "serde"] }
serde.workspace = true
serde_json.workspace = true
