[package]
name = "tempo-precompiles"
description = "TODO:"

version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
tempo-contracts.workspace = true
tempo-chainspec.workspace = true
tempo-precompiles-macros.workspace = true
alloy-primitives.workspace = true
alloy-sol-types.workspace = true
alloy-consensus = { workspace = true, features = ["k256"] }
alloy-evm.workspace = true
revm.workspace = true

commonware-cryptography = { workspace = true, optional = true }
commonware-codec = { workspace = true, optional = true }

hashbrown.workspace = true
once_cell.workspace = true
tracing = { workspace = true }
thiserror.workspace = true
derive_more.workspace = true
scoped-tls = { version = "1.0", optional = true }

[dev-dependencies]
criterion.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true
alloy-primitives = { workspace = true, features = ["rand"] }
eyre.workspace = true
rand_08.workspace = true
proptest.workspace = true
serde.workspace = true
serde_json.workspace = true
tempo-evm.workspace = true

[features]
default = ["std", "rpc"]
std = [
    "dep:scoped-tls",
    "dep:commonware-cryptography",
    "dep:commonware-codec",
    "alloy-primitives/std",
    "alloy-sol-types/std",
    "alloy-consensus/std",
    "alloy-evm/std",
    "revm/std",
    "tempo-contracts/std",
    "tempo-chainspec/std",
    "once_cell/std",
    "tracing/std",
    "thiserror/std",
]
test-utils = ["std", "alloy-primitives/rand"]
rpc = ["std", "tempo-contracts/rpc"]

[[test]]
name = "storage"
required-features = ["test-utils"]

[[bench]]
name = "tempo_precompiles"
harness = false
required-features = ["test-utils"]
