[package]
name = "tempo-precompiles"
description = "Tempo EVM precompile implementations, including TIP-20 and Nitro attestation verification"

version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
categories.workspace = true
keywords.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
tempo-contracts.workspace = true
tempo-chainspec = { workspace = true, features = ["evm"] }
tempo-primitives = { workspace = true, features = ["evm"] }
tempo-precompiles-macros.workspace = true
tempo-nitro-attestation.workspace = true
alloy = { workspace = true, features = ["sol-types", "consensus"] }
alloy-evm = { workspace = true, features = ["std"] }
alloy-primitives = { workspace = true, features = ["map-foldhash"] }
revm.workspace = true
paste.workspace = true
bitflags.workspace = true
aws-lc-rs.workspace = true

commonware-cryptography.workspace = true
commonware-codec.workspace = true

tracing.workspace = true
thiserror.workspace = true
derive_more.workspace = true
scoped-tls = "1.0"

[dev-dependencies]
base64.workspace = true
criterion.workspace = true
alloy-signer.workspace = true
alloy-signer-local.workspace = true
alloy-primitives = { workspace = true, features = ["rand"] }
eyre.workspace = true
p256.workspace = true
rand_08.workspace = true
proptest.workspace = true
serde.workspace = true
serde_json.workspace = true
tempo-evm = { workspace = true, features = ["engine"] }
tempo-alloy.workspace = true
tempo-revm.workspace = true
x509-cert = { version = "=0.2.5", default-features = false }

[features]
default = ["rpc"]
test-utils = ["alloy/getrandom"]
rpc = ["tempo-contracts/rpc"]

[[test]]
name = "storage"
required-features = ["test-utils"]

[[bench]]
name = "tempo_precompiles"
harness = false
required-features = ["test-utils"]
