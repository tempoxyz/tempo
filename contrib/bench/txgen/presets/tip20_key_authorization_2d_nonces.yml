chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}

address_pools:
  existing_recipients:
    fast:
      seed: "test test test test test test test test test test test junk"
      range:
        - ${TXGEN_EXISTING_RECIPIENTS_START}
        - ${TXGEN_EXISTING_RECIPIENTS_END}

artifacts:
  ERC20: ../erc20.abi.json

templates:
  key_authorization_tip20_transfer:
    type: tempo
    auth:
      mode: key_authorization
      access_key:
        derive: per_tx
      key_type: secp256k1
      limits: ${TXGEN_KEYCHAIN_TIP20_LIMITS}
      allowed_calls: ${TXGEN_KEYCHAIN_TIP20_ALLOWED_CALLS}
      witness:
        random_bytes: 32
    from:
      pool: users
      select: random
    gas_limit: ${TXGEN_KEY_AUTHORIZATION_GAS_LIMIT}
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    nonce_key:
      uniform: [1, 18446744073709551615]
    call:
      to:
        choice: ${TXGEN_TIP20_TOKENS}
      abi: ERC20
      function: transfer
      args:
        - address_pool:
            pool: existing_recipients
            select: random
        - 1

mix:
  - template: key_authorization_tip20_transfer
    weight: 100
