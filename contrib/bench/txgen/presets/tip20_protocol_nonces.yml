chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}

address_pools:
  existing_recipients:
    fast:
      seed: "test test test test test test test test test test test junk"
      range:
        - ${TXGEN_EXISTING_RECIPIENTS_START}
        - ${TXGEN_EXISTING_RECIPIENTS_END}

artifacts:
  ERC20: ../erc20.abi.json
  FeeAMM: ../fee-amm.abi.json

setup:
  steps:
    - id: mint_alpha_pathusd_liquidity
      tx:
        type: tempo
        from:
          pool: users
          select: { index: 0 }
        gas_limit: 1000000
        max_fee_per_gas: 100000000000
        max_priority_fee_per_gas: 100000000000
        call:
          to: "0xfeec000000000000000000000000000000000000"
          abi: FeeAMM
          function: mint
          args:
            - "0x20c0000000000000000000000000000000000001"
            - "0x20c0000000000000000000000000000000000000"
            - 10000000000
            - "0xfeec000000000000000000000000000000000000"
    - id: mint_beta_pathusd_liquidity
      tx:
        type: tempo
        from:
          pool: users
          select: { index: 0 }
        gas_limit: 1000000
        max_fee_per_gas: 100000000000
        max_priority_fee_per_gas: 100000000000
        call:
          to: "0xfeec000000000000000000000000000000000000"
          abi: FeeAMM
          function: mint
          args:
            - "0x20c0000000000000000000000000000000000002"
            - "0x20c0000000000000000000000000000000000000"
            - 10000000000
            - "0xfeec000000000000000000000000000000000000"
    - id: mint_theta_pathusd_liquidity
      tx:
        type: tempo
        from:
          pool: users
          select: { index: 0 }
        gas_limit: 1000000
        max_fee_per_gas: 100000000000
        max_priority_fee_per_gas: 100000000000
        call:
          to: "0xfeec000000000000000000000000000000000000"
          abi: FeeAMM
          function: mint
          args:
            - "0x20c0000000000000000000000000000000000003"
            - "0x20c0000000000000000000000000000000000000"
            - 10000000000
            - "0xfeec000000000000000000000000000000000000"

templates:
  tip20_transfer:
    type: tempo
    from:
      pool: users
      select: random
    gas_limit: 350000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token:
      choice: ${TXGEN_TIP20_TOKENS}
    call:
      to:
        choice: ${TXGEN_TIP20_TOKENS}
      abi: ERC20
      function: transfer
      args:
        - address_pool:
            pool: existing_recipients
            select: random
        - 1

mix:
  - template: tip20_transfer
    weight: 100
