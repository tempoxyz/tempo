chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}

artifacts:
  ERC20: ../erc20.abi.json
  MPPChannel:
    abi: ../mpp-channel.json
    bytecode: ../mpp-channel.json

setup:
  steps:
    - id: channel
      deploy:
        type: eip1559
        from:
          pool: users
          select: { index: 0 }
        artifact: MPPChannel
        gas_limit: 20000000
        constructor_args: []

templates:
  mpp_approve:
    type: tempo
    gas_limit: 2000000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    nonce_key: "1"
    call:
      to: "0x20c0000000000000000000000000000000000001"
      abi: ERC20
      function: approve
      args: []

  mpp_open:
    type: tempo
    gas_limit: 2000000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    nonce_key: "1"
    call:
      abi: MPPChannel
      function: open
      args: []

  mpp_close:
    type: tempo
    gas_limit: 2000000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    nonce_key: "1"
    call:
      abi: MPPChannel
      function: close
      args: []

sequences:
  mpp_approve_open_close:
    bindings:
      payer:
        account:
          pool: users
          select: random
      token:
        address:
          const: "0x20c0000000000000000000000000000000000001"
      authorized_signer:
        address:
          const: "0x0000000000000000000000000000000000000000"
      salt:
        bytes32:
          random_bytes: 32
      channel_id:
        abi_hash:
          types: [address, address, address, bytes32, address, address, uint256]
          values:
            - { var: payer.address }
            - { var: payer.address }
            - { var: token }
            - { var: salt }
            - { var: authorized_signer }
            - { var: setup.channel.address }
            - { var: chain_id }
      channel_key:
        abi_encode_packed:
          types: [bytes32, address, address, bytes32]
          values:
            - { var: channel_id }
            - { var: token }
            - { var: authorized_signer }
            - { var: salt }
    steps:
      - name: approve
        template: mpp_approve
        with:
          from: { var: payer.ref }
          call:
            args:
              - { var: setup.channel.address }
              - 1
      - name: open
        template: mpp_open
        with:
          from: { var: payer.ref }
          call:
            to: { var: setup.channel.address }
            args:
              - { var: payer.address }
              - { var: token }
              - 1
              - { var: salt }
              - { var: authorized_signer }
      - name: close
        template: mpp_close
        with:
          from: { var: payer.ref }
          call:
            to: { var: setup.channel.address }
            args:
              - { var: channel_key }
              - 0
              - "0x"

mix:
  - sequence: mpp_approve_open_close
    weight: 100
