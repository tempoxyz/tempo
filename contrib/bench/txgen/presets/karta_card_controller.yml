chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}

artifacts:
  ERC20: ../erc20.abi.json

templates:
  karta_like_authorize_card_controller:
    type: tempo
    from:
      pool: users
      select: random
    gas_limit: 300000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    expiring_nonce: true
    valid_for_secs: 25
    call:
      to: "0x20c0000000000000000000000000000000000000"
      abi: ERC20
      function: approve
      args:
        - pool:
            pool: users
            select: random
        - uniform: [1000000, 250000000]

  karta_like_card_spend:
    type: tempo
    from:
      pool: users
      select: random
    gas_limit: 300000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    expiring_nonce: true
    valid_for_secs: 25
    call:
      to: "0x20c0000000000000000000000000000000000000"
      abi: ERC20
      function: transfer
      args:
        - pool:
            pool: users
            select: random
        - uniform: [1000000, 250000000]

mix:
  - template: karta_like_authorize_card_controller
    weight: 30
  - template: karta_like_card_spend
    weight: 70
