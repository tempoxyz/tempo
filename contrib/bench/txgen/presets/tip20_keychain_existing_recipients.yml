chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}

address_pools:
  existing_recipients:
    fast:
      seed: "test test test test test test test test test test test junk"
      range:
        - ${TXGEN_EXISTING_RECIPIENTS_START}
        - ${TXGEN_EXISTING_RECIPIENTS_END}

artifacts:
  ERC20: ../erc20.abi.json

setup:
  steps:
    - id: authorize_keychain_users
      keychain_authorize_pool:
        accounts:
          pool: users
        access_keys:
          mnemonic: "test test test test test test test test test test test junk"
          range:
            - ${TXGEN_KEYCHAIN_ACCESS_KEYS_START}
            - ${TXGEN_KEYCHAIN_ACCESS_KEYS_END}
        key_type: secp256k1
        gas_limit: 3000000
        limits: ${TXGEN_KEYCHAIN_TIP20_LIMITS}
        allowed_calls: ${TXGEN_KEYCHAIN_TIP20_ALLOWED_CALLS}

templates:
  keychain_tip20_transfer:
    type: tempo
    auth:
      mode: keychain
      access_key:
        from_setup: authorize_keychain_users
        pair: same_index
    from:
      pool: users
      select: random
    gas_limit: 3000000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    expiring_nonce: true
    valid_for_secs: 25
    call:
      to:
        choice: ${TXGEN_TIP20_TOKENS}
      abi: ERC20
      function: transfer
      args:
        - address_pool:
            pool: existing_recipients
            select: random
        - 1

mix:
  - template: keychain_tip20_transfer
    weight: 100
