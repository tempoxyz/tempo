chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}

artifacts:
  ERC20: ../erc20.abi.json
  FeeAMM: ../fee-amm.abi.json

setup:
  steps:
    - id: mint_alpha_pathusd_liquidity
      tx:
        type: tempo
        from:
          pool: users
          select: { index: 0 }
        gas_limit: 1000000
        max_fee_per_gas: 100000000000
        max_priority_fee_per_gas: 100000000000
        call:
          to: "0xfeec000000000000000000000000000000000000"
          abi: FeeAMM
          function: mint
          args:
            - "0x20c0000000000000000000000000000000000001"
            - "0x20c0000000000000000000000000000000000000"
            - 10000000000
            - "0xfeec000000000000000000000000000000000000"
    - id: mint_beta_pathusd_liquidity
      tx:
        type: tempo
        from:
          pool: users
          select: { index: 0 }
        gas_limit: 1000000
        max_fee_per_gas: 100000000000
        max_priority_fee_per_gas: 100000000000
        call:
          to: "0xfeec000000000000000000000000000000000000"
          abi: FeeAMM
          function: mint
          args:
            - "0x20c0000000000000000000000000000000000002"
            - "0x20c0000000000000000000000000000000000000"
            - 10000000000
            - "0xfeec000000000000000000000000000000000000"
    - id: mint_theta_pathusd_liquidity
      tx:
        type: tempo
        from:
          pool: users
          select: { index: 0 }
        gas_limit: 1000000
        max_fee_per_gas: 100000000000
        max_priority_fee_per_gas: 100000000000
        call:
          to: "0xfeec000000000000000000000000000000000000"
          abi: FeeAMM
          function: mint
          args:
            - "0x20c0000000000000000000000000000000000003"
            - "0x20c0000000000000000000000000000000000000"
            - 10000000000
            - "0xfeec000000000000000000000000000000000000"

templates:
  key_authorization_tip20_transfer:
    type: tempo
    auth:
      mode: key_authorization
      access_key:
        derive: per_tx
      key_type: secp256k1
      limits: ${TXGEN_KEYCHAIN_TIP20_LIMITS}
      allowed_calls: ${TXGEN_KEYCHAIN_TIP20_ALLOWED_CALLS}
      witness:
        random_bytes: 32
    from:
      pool: users
      select: random
    gas_limit: ${TXGEN_KEY_AUTHORIZATION_GAS_LIMIT}
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token:
      choice: ${TXGEN_TIP20_TOKENS}
    expiring_nonce: true
    valid_for_secs: 5
    call:
      to:
        choice: ${TXGEN_TIP20_TOKENS}
      abi: ERC20
      function: transfer
      args:
        - pool:
            pool: users
            select: random
        - 1

mix:
  - template: key_authorization_tip20_transfer
    weight: 100
