# Neobank flow.
#
# This preset keeps the same user and amount across both workload transactions.
# It uses local TIP20 token 1 as the NBUSD stand-in for the DirectSwap leg. The
# setup phase deploys mainnet runtime bytecode wrapped as initcode and seeds
# the local route liquidity before measured workload starts.
chain_id: 1337

gas:
  max_fee_per_gas: 100000000000
  max_priority_fee_per_gas: 100000000000

accounts:
  users:
    mnemonic: "test test test test test test test test test test test junk"
    range:
      - 0
      - ${TXGEN_ACCOUNTS}
  fee_payers:
    mnemonic: "test test test test test test test test test test test junk"
    index: 100000

artifacts:
  ERC20: ../erc20.abi.json
  DirectSwap: ../directswap.abi.json
  ERC4626Vault: ../erc4626-vault.abi.json
  DirectSwapRuntime:
    abi: ../directswap.abi.json
    bytecode: ../neobank-bytecodes/directswap.bin
  PrivyFeeWrapperRuntime:
    abi: ../erc4626-vault.abi.json
    bytecode: ../neobank-bytecodes/privy-fee-wrapper.bin
  PrivyAdapterRuntime:
    abi: ../empty.abi.json
    bytecode: ../neobank-bytecodes/privy-adapter.bin
  SentoraPathUSDVaultRuntime:
    abi: ../erc4626-vault.abi.json
    bytecode: ../neobank-bytecodes/sentora-pathusd-vault.bin
  SentoraAdapterRuntime:
    abi: ../empty.abi.json
    bytecode: ../neobank-bytecodes/sentora-adapter.bin
  MorphoMarketRuntime:
    abi: ../empty.abi.json
    bytecode: ../neobank-bytecodes/morpho-market.bin
  OracleRuntime:
    abi: ../empty.abi.json
    bytecode: ../neobank-bytecodes/oracle.bin
  DirectSwapRouteRuntime:
    abi: ../empty.abi.json
    bytecode: ../neobank-bytecodes/directswap-route.bin
  WrapperRuntime:
    abi: ../empty.abi.json
    bytecode: ../neobank-bytecodes/wrapper.bin

setup:
  steps:
    - id: directswap
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: DirectSwapRuntime
        gas_limit: 8000000
        constructor_args: []
    - id: privy_fee_wrapper
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: PrivyFeeWrapperRuntime
        gas_limit: 30000000
        constructor_args: []
    - id: privy_adapter
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: PrivyAdapterRuntime
        gas_limit: 8000000
        constructor_args: []
    - id: sentora_pathusd_vault
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: SentoraPathUSDVaultRuntime
        gas_limit: 30000000
        constructor_args: []
    - id: sentora_adapter
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: SentoraAdapterRuntime
        gas_limit: 20000000
        constructor_args: []
    - id: morpho_market
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: MorphoMarketRuntime
        gas_limit: 30000000
        constructor_args: []
    - id: oracle
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: OracleRuntime
        gas_limit: 8000000
        constructor_args: []
    - id: directswap_route
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: DirectSwapRouteRuntime
        gas_limit: 10000000
        constructor_args: []
    - id: wrapper
      deploy:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        artifact: WrapperRuntime
        gas_limit: 1000000
        constructor_args: []
    - id: directswap_route_seed_token0
      tx:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        gas_limit: 1000000
        call:
          to: "0x20c0000000000000000000000000000000000000"
          abi: ERC20
          function: transfer
          args:
            - { var: setup.directswap_route.address }
            - 100000000000
    - id: directswap_seed_token0
      tx:
        type: eip1559
        from:
          pool: fee_payers
          select: { index: 0 }
        gas_limit: 1000000
        call:
          to: "0x20c0000000000000000000000000000000000000"
          abi: ERC20
          function: transfer
          args:
            - { var: setup.directswap.address }
            - 100000000000
templates:
  neobank_directswap:
    type: tempo
    from:
      pool: users
      select: random
    sponsor:
      pool: fee_payers
      select: { index: 0 }
    gas_limit: 8000000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    expiring_nonce: true
    valid_for_secs: 25
    calls: []

  neobank_vault_deposit:
    type: tempo
    from:
      pool: users
      select: random
    sponsor:
      pool: fee_payers
      select: { index: 0 }
    gas_limit: 8000000
    max_fee_per_gas: 100000000000
    max_priority_fee_per_gas: 100000000000
    fee_token: "0x20c0000000000000000000000000000000000000"
    expiring_nonce: true
    valid_for_secs: 25
    calls: []

sequences:
  neobank_full_flow:
    bindings:
      user:
        account:
          pool: users
          select: random
      amount:
        u256:
          uniform: [100000000, 1000000000]
    steps:
      - name: nbusd_to_pathusd
        template: neobank_directswap
        with:
          from: { var: user.ref }
          calls:
            - to: "0x20c0000000000000000000000000000000000001"
              abi: ERC20
              function: approve
              args:
                - { var: setup.directswap.address }
                - { var: amount }
            - to: { var: setup.directswap.address }
              abi: DirectSwap
              function: swapExactIn
              args:
                - "0x20c0000000000000000000000000000000000001"
                - "0x20c0000000000000000000000000000000000000"
                - { var: amount }
      - name: pathusd_to_neobank_vault
        template: neobank_vault_deposit
        with:
          from: { var: user.ref }
          calls:
            - to: "0x20c0000000000000000000000000000000000000"
              abi: ERC20
              function: approve
              args:
                - { var: setup.privy_fee_wrapper.address }
                - { var: amount }
            - to: { var: setup.privy_fee_wrapper.address }
              abi: ERC4626Vault
              function: deposit
              args:
                - { var: amount }
                - { var: user.address }

mix:
  - sequence: neobank_full_flow
    weight: 100