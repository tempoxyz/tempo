rules:
  template-injection:
    ignore:
      # Existing benchmark/release workflows interpolate trusted workflow outputs
      # into scripts. Keep these baselined so new workflow files still fail.
      - bench-e2e-multi-region.yml
      - bench-e2e.yml
      - bench-replay-scheduled.yml
      - bench-replay.yml
      - codspeed-microbench.yml
      - docker.yml
      - release.yml
      - update-reth.yml
  artipacked:
    ignore:
      # update-reth intentionally persists its Derek token for authenticated git
      # pushes after checkout.
      - update-reth.yml:37
