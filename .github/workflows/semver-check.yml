name: Semver check

permissions: {}

on:
  pull_request:
    branches: [main]
    paths:
      - crates/hardfork/**
      - crates/contracts/**
      - crates/primitives/**
      - crates/chainspec/**
      - crates/alloy/**
      - scripts/publish-crates.sh
      - scripts/sanitize_source.py
      - scripts/sanitize_toml.py
      - Cargo.toml
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  semver-check:
    name: semver check
    runs-on: depot-ubuntu-latest-4
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: taiki-e/install-action@d0f23220b09a75c6db730f13bb37c4f8144b4382 # v2.75.9
        with:
          tool: cargo-semver-checks

      - name: Run semver checks on sanitized crates
        run: ./scripts/publish-crates.sh --semver-check
