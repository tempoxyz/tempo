# Runs the txgen benchmark path directly via workflow_dispatch.
#
# This is intentionally separate from bench-e2e.yml so the txgen script can be
# tested in isolation before it is fully integrated into the main benchmark flow.

name: bench-txgen-dispatch

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: Git ref for the baseline run. Use `local` to use the checked-out tree.
        type: string
        required: true
        default: origin/main
      feature:
        description: Git ref for the feature run. Use `local` to use the checked-out tree.
        type: string
        required: true
        default: local
      txgen-ref:
        description: Optional ref to pin in tempoxyz/txgen.
        type: string
        required: false
        default: ""
      preset:
        description: Benchmark preset. txgen currently supports only `tip20`.
        type: string
        required: true
        default: tip20
      duration:
        description: Benchmark duration in seconds.
        type: string
        required: true
        default: "30"
      bloat:
        description: State bloat size in MiB.
        type: string
        required: true
        default: "1"
      tps:
        description: Target transactions per second.
        type: string
        required: true
        default: "1000"
      accounts:
        description: Number of txgen accounts to generate.
        type: string
        required: true
        default: "1000"
      max-concurrent-requests:
        description: Max in-flight txgen requests.
        type: string
        required: true
        default: "100"
      samply:
        description: Capture samply profiles.
        type: boolean
        required: true
        default: false
      tracy:
        description: Tracy mode.
        type: choice
        required: true
        default: off
        options:
          - off
          - on
          - full
      tracy-seconds:
        description: Tracy capture duration in seconds.
        type: string
        required: true
        default: "30"
      tracy-offset:
        description: Tracy capture start offset in seconds.
        type: string
        required: true
        default: "120"
      node-args:
        description: Extra args passed to both node runs.
        type: string
        required: false
        default: ""
      baseline-args:
        description: Extra args passed only to the baseline node.
        type: string
        required: false
        default: ""
      feature-args:
        description: Extra args passed only to the feature node.
        type: string
        required: false
        default: ""
      bench-args:
        description: Extra bench args.
        type: string
        required: false
        default: ""
      bench-env:
        description: Extra env vars for the bench sender process.
        type: string
        required: false
        default: ""
      baseline-env:
        description: Extra env vars for the baseline node process.
        type: string
        required: false
        default: ""
      feature-env:
        description: Extra env vars for the feature node process.
        type: string
        required: false
        default: ""
      baseline-hardfork:
        description: Optional baseline hardfork.
        type: string
        required: false
        default: ""
      feature-hardfork:
        description: Optional feature hardfork.
        type: string
        required: false
        default: ""
      gas-limit:
        description: Optional gas limit override.
        type: string
        required: true
        default: "1000000000000"
      no-cache:
        description: Disable worktree binary cache usage.
        type: boolean
        required: true
        default: false
      force:
        description: Force regeneration of local benchmark state.
        type: boolean
        required: true
        default: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

permissions:
  contents: read

jobs:
  bench-txgen-dispatch:
    name: bench-txgen-dispatch
    runs-on: [self-hosted, Linux, X64, bare-metal]
    timeout-minutes: 300
    steps:
      - name: Clean up previous results
        run: sudo rm -rf bench-results/ 2>/dev/null || true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pre-fetch comparison refs
        run: |
          for ref in "${{ inputs.baseline }}" "${{ inputs.feature }}"; do
            [ -z "$ref" ] && continue
            [ "$ref" = "local" ] && continue
            git fetch origin "$ref" --quiet || true
          done

      - name: Checkout txgen repository
        uses: actions/checkout@v6
        with:
          repository: tempoxyz/txgen
          token: ${{ secrets.DEREK_PAT || github.token }}
          path: txgen
          fetch-depth: 0

      - name: Checkout txgen ref
        if: inputs.txgen-ref != ''
        working-directory: txgen
        run: |
          git fetch origin "${{ inputs.txgen-ref }}" --quiet
          git checkout --detach FETCH_HEAD

      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9
        continue-on-error: true

      - name: Build txgen backend
        working-directory: txgen
        run: |
          cargo build --release --bin txgen-tempo --bin bench
          echo "TXGEN_REPO_DIR=$GITHUB_WORKSPACE/txgen" >> "$GITHUB_ENV"
          echo "TXGEN_TEMPO_BIN=$GITHUB_WORKSPACE/txgen/target/release/txgen-tempo" >> "$GITHUB_ENV"
          echo "TXGEN_BENCH_BIN=$GITHUB_WORKSPACE/txgen/target/release/bench" >> "$GITHUB_ENV"

      - name: Run txgen benchmark
        run: |
          tracy_mode='${{ inputs.tracy }}'

          cmd=(
            nu contrib/bench/bench-txgen.nu run
            --mode e2e
            --preset "${{ inputs.preset }}"
            --duration "${{ inputs.duration }}"
            --bloat "${{ inputs.bloat }}"
            --tps "${{ inputs.tps }}"
            --accounts "${{ inputs.accounts }}"
            --max-concurrent-requests "${{ inputs.max-concurrent-requests }}"
            --no-infra
            --baseline "${{ inputs.baseline }}"
            --feature "${{ inputs.feature }}"
            --bench-datadir "/reth-bench/tempo_${{ inputs.bloat }}mb"
            --tune
            --gas-limit "${{ inputs.gas-limit }}"
          )

          [ "${{ inputs.samply }}" = 'true' ] && cmd+=(--samply)
          [ "${{ inputs.no-cache }}" = 'true' ] && cmd+=(--no-cache)
          [ "${{ inputs.force }}" = 'true' ] && cmd+=(--force)
          case "$tracy_mode" in
            ''|off|false)
              ;;
            true)
              cmd+=(--tracy on --tracy-seconds "${{ inputs.tracy-seconds }}" --tracy-offset "${{ inputs.tracy-offset }}")
              ;;
            on|full)
              cmd+=(--tracy "$tracy_mode" --tracy-seconds "${{ inputs.tracy-seconds }}" --tracy-offset "${{ inputs.tracy-offset }}")
              ;;
            *)
              echo "::error::Unsupported tracy input value: $tracy_mode"
              exit 1
              ;;
          esac
          [ -n "${{ inputs.node-args }}" ] && cmd+=(--node-args="${{ inputs.node-args }}")
          [ -n "${{ inputs.baseline-args }}" ] && cmd+=(--baseline-args="${{ inputs.baseline-args }}")
          [ -n "${{ inputs.feature-args }}" ] && cmd+=(--feature-args="${{ inputs.feature-args }}")
          [ -n "${{ inputs.bench-args }}" ] && cmd+=(--bench-args="${{ inputs.bench-args }}")
          [ -n "${{ inputs.bench-env }}" ] && cmd+=(--bench-env="${{ inputs.bench-env }}")
          [ -n "${{ inputs.baseline-env }}" ] && cmd+=(--baseline-env="${{ inputs.baseline-env }}")
          [ -n "${{ inputs.feature-env }}" ] && cmd+=(--feature-env="${{ inputs.feature-env }}")
          [ -n "${{ inputs.baseline-hardfork }}" ] && cmd+=(--baseline-hardfork "${{ inputs.baseline-hardfork }}" --feature-hardfork "${{ inputs.feature-hardfork }}")

          printf 'Running command:\n'
          printf '  %q' "${cmd[@]}"
          printf '\n'

          "${cmd[@]}"

      - name: Find results directory
        id: results-dir
        if: success()
        run: |
          RESULTS_DIR=$(ls -d bench-results/*/ 2>/dev/null | tail -1 | sed 's:/$::')
          if [ -z "$RESULTS_DIR" ]; then
            echo "::error::No results directory found"
            exit 1
          fi
          echo "path=$RESULTS_DIR" >> "$GITHUB_OUTPUT"
          echo "Results directory: $RESULTS_DIR"

      - name: Add Summary To Job
        if: success()
        run: |
          RESULTS_DIR="${{ steps.results-dir.outputs.path }}"
          if [ -f "$RESULTS_DIR/summary.md" ]; then
            cat "$RESULTS_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Benchmark completed, but no summary.md was produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: tempo-bench-txgen-results
          path: bench-results/
