name: Require pull request audit

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [opened, reopened, synchronize]
  # Without this, PRs get stuck in the merge queue waiting for this status.
  merge_group:

permissions: {}

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      issues: read
      pull-requests: read
      statuses: write
    steps:
      - name: Check for a Cyclops audit run
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pullNumber = context.payload.pull_request.number;
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullNumber,
              per_page: 100,
            });
            const auditWasRun = comments.some(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.startsWith('<!-- cyclops-audit-run -->')
            );

            if (!auditWasRun) {
              // The audit workflow may set the status to success after we
              // listed comments but before we write; never downgrade it.
              const statuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pull.head.sha,
                per_page: 100,
              });
              const current = statuses.find(status => status.context === 'Cyclops audit run');
              if (current?.state === 'success') {
                core.info('Audit status is already success for this commit; leaving it in place.');
                return;
              }
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pull.head.sha,
              state: auditWasRun ? 'success' : 'pending',
              context: 'Cyclops audit run',
              description: auditWasRun
                ? 'A Cyclops audit was run for this pull request'
                : 'Run a Cyclops audit before merging',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/pull/${pullNumber}`,
            });

  merge-group:
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group'
    permissions:
      statuses: write
    steps:
      - name: Pass merge group
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // The audit is enforced on the pull request before it can enter
            // the merge queue, so merge group commits pass through.
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.merge_group.head_sha,
              state: 'success',
              context: 'Cyclops audit run',
              description: 'Audit enforced on the pull request',
            });
