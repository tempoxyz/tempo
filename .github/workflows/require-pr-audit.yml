name: Require pull request audit

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [opened, reopened, synchronize, labeled, unlabeled]
  # Without this, PRs get stuck in the merge queue waiting for this status.
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_sha }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: Report audit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const audited = pull.labels.some(label => label.name === 'cyclops-audited');
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pull.head.sha,
              state: audited ? 'success' : 'pending',
              context: 'Cyclops audit run',
              description: audited
                ? 'A Cyclops audit was run for this pull request'
                : 'Run a Cyclops audit before merging',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/pull/${context.payload.pull_request.number}`,
            });

  merge-group:
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group'
    permissions:
      statuses: write
    steps:
      - name: Pass merge group
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // The audit is enforced on the pull request before it can enter
            // the merge queue, so merge group commits pass through.
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.merge_group.head_sha,
              state: 'success',
              context: 'Cyclops audit run',
              description: 'Audit enforced on the pull request',
            });
