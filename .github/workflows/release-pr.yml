name: Release PR

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release-pr:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install changelogs
        run: cargo install --git https://github.com/wevm/changelogs --branch master changelogs

      - name: Keep only SDK changelog entries
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          targets = {"tempo-alloy", "tempo-primitives", "tempo-contracts"}

          for path in Path(".changelog").glob("*.md"):
              text = path.read_text(encoding="utf-8")
              lines = text.splitlines(keepends=True)

              if not lines or lines[0].strip() != "---":
                  print(f"Removing {path} (missing changelog frontmatter)")
                  path.unlink()
                  continue

              end = next((i for i, line in enumerate(lines[1:], start=1) if line.strip() == "---"), None)
              if end is None:
                  print(f"Removing {path} (unterminated changelog frontmatter)")
                  path.unlink()
                  continue

              kept = []
              for line in lines[1:end]:
                  match = re.match(r'^\s*"?([A-Za-z0-9_-]+)"?\s*:', line)
                  if match and match.group(1) in targets:
                      kept.append(line if line.endswith("\n") else f"{line}\n")

              if not kept:
                  print(f"Removing {path} (does not target SDK crates)")
                  path.unlink()
                  continue

              body = "".join(lines[end + 1:])
              path.write_text("---\n" + "".join(kept) + "---\n" + body, encoding="utf-8")
          PY

      - name: Check for changelogs
        id: check
        run: |
          if [ -d ".changelog" ] && [ "$(find .changelog -name '*.md' ! -name 'README.md' 2>/dev/null | head -1)" ]; then
            echo "hasChangelogs=true" >> "$GITHUB_OUTPUT"
            echo "Found pending changelogs"
          else
            echo "hasChangelogs=false" >> "$GITHUB_OUTPUT"
            echo "No pending changelogs"
          fi

      - name: Setup Git user
        if: steps.check.outputs.hasChangelogs == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run version command
        if: steps.check.outputs.hasChangelogs == 'true'
        id: version
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          output=$(changelogs version 2>&1) && version_exit=0 || version_exit=$?
          echo "$output"
          if [ $version_exit -ne 0 ]; then
            echo "::error::changelogs version failed with exit code $version_exit"
            exit $version_exit
          fi

          all_versions=$(echo "$output" | grep -oE '[a-zA-Z0-9_-]+ [0-9]+\.[0-9]+\.[0-9]+ → [0-9]+\.[0-9]+\.[0-9]+' | sed 's/ .* → /@/')
          count=$(echo "$all_versions" | grep -c . || echo 0)

          if [ "$count" -eq 0 ]; then
            versions=""
          elif [ "$count" -eq 1 ]; then
            versions="\`$(echo "$all_versions" | head -1)\`"
          elif [ "$count" -eq 2 ]; then
            first=$(echo "$all_versions" | head -1)
            second=$(echo "$all_versions" | tail -1)
            versions="\`$first\` and \`$second\`"
          else
            first=$(echo "$all_versions" | head -1)
            second=$(echo "$all_versions" | sed -n '2p')
            remaining=$((count - 2))
            versions="\`$first\`, \`$second\` and $remaining more"
          fi

          echo "title=chore: release $versions" >> "$GITHUB_OUTPUT"
          echo "commit-msg=chore: release $versions" >> "$GITHUB_OUTPUT"

      - name: Refresh Cargo.lock
        if: steps.check.outputs.hasChangelogs == 'true'
        run: cargo metadata --format-version=1 > /dev/null

      - name: Generate PR body
        if: steps.check.outputs.hasChangelogs == 'true'
        id: body
        run: |
          {
            echo "This PR was opened by the Changelogs release workflow."
            echo
            echo "When you're ready to release, merge this PR and the packages will be published."
            echo
            echo "---"
            echo
          } > /tmp/pr-body.md
          echo "body-file=/tmp/pr-body.md" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.check.outputs.hasChangelogs == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.TEMPO_GITHUB_PAT }}
          branch: changelog-release/main
          base: ${{ github.ref_name }}
          title: ${{ steps.version.outputs.title }}
          body-path: ${{ steps.body.outputs.body-file }}
          commit-message: ${{ steps.version.outputs.commit-msg }}
          delete-branch: true
