name: Publish check

permissions: {}

on:
  pull_request:
    branches: [main]
    paths:
      - crates/chainspec/**
      - crates/precompiles-macros/**
      - crates/precompiles/**
      - crates/revm/**
      - crates/contracts/**
      - crates/primitives/**
      - crates/alloy/**
      - scripts/publish/**
      - scripts/sanitize_source.py
      - scripts/sanitize_toml.py
      - Cargo.toml
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  publish-check:
    name: publish check
    runs-on: depot-ubuntu-latest-4
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: Detect publish groups
        if: github.event_name == 'pull_request'
        id: publish-groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          alloy=false; revm=false
          if echo "$files" | grep -qE '^(scripts/publish/|scripts/sanitize_toml\.py$|Cargo\.toml$)'; then
            alloy=true; revm=true
          fi
          echo "$files" | grep -qE '^(crates/(contracts|primitives|alloy)/|scripts/sanitize_source\.py$)' && alloy=true
          echo "$files" | grep -qE '^crates/(chainspec|precompiles-macros|precompiles|revm)/' && revm=true
          echo "alloy=$alloy" >> "$GITHUB_OUTPUT"
          echo "revm=$revm" >> "$GITHUB_OUTPUT"
          if [ "$alloy" = "false" ] && [ "$revm" = "false" ]; then
            echo "No published crate groups detected." >&2; exit 1
          fi

      - name: Verify alloy crates are publishable
        if: github.event_name != 'pull_request' || steps.publish-groups.outputs.alloy == 'true'
        run: ./scripts/publish/publish.sh alloy
      - name: Verify revm stack crates are publishable
        if: github.event_name != 'pull_request' || steps.publish-groups.outputs.revm == 'true'
        run: ./scripts/publish/publish.sh revm
