name: CodSpeed microbenchmarks

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:
    inputs:
      packages:
        description: "Cargo package(s) containing benchmark targets, separated by spaces"
        required: true
        default: "tempo-evm tempo-precompiles"
        type: string
      benchmarks:
        description: "Cargo bench target(s), separated by spaces; leave empty for every bench in the package(s)"
        required: false
        default: ""
        type: string
      filters:
        description: "Optional benchmark name filter passed to cargo codspeed run"
        required: false
        default: ""
        type: string
      measurement_modes:
        description: "CodSpeed measurement mode(s), separated by commas"
        required: true
        default: "simulation"
        type: string
      pre_bench_txgen_ref:
        description: "Optional ref to pin in tempoxyz/txgen for the pre-bench artifact collection"
        required: false
        default: "mediocregopher/bench-send-bal-output"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  pre-bench:
    name: Collect CodSpeed pre-bench artifacts
    runs-on: [self-hosted, Linux, X64, bare-metal-dual-schelk]
    timeout-minutes: 120
    env:
      CODSPEED_PRE_BENCH_PRESET: tip20
      CODSPEED_PRE_BENCH_DURATION: "300"
      CODSPEED_PRE_BENCH_BLOAT: "100"
      CODSPEED_PRE_BENCH_TPS: "20000"
      CODSPEED_PRE_BENCH_ACCOUNTS: "1000"
      CODSPEED_PRE_BENCH_MAX_CONCURRENT_REQUESTS: "100"
      CODSPEED_PRE_BENCH_GAS_LIMIT: "1000000000"
      CODSPEED_PRE_BENCH_FEATURES: "jemalloc,asm-keccak,keccak-cache-global"
      CODSPEED_PRE_BENCH_TXGEN_REF: ${{ inputs.pre_bench_txgen_ref || 'mediocregopher/bench-send-bal-output' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
        continue-on-error: true
      - name: Install txgen
        env:
          TXGEN_GIT_TOKEN: ${{ secrets.DEREK_BENCH_TOKEN || github.token }}
        run: |
          CARGO_BIN_DIR="${CARGO_HOME:-$HOME/.cargo}/bin"
          echo "$CARGO_BIN_DIR" >> "$GITHUB_PATH"
          export PATH="$CARGO_BIN_DIR:$PATH"

          TXGEN_GIT_URL="https://x-access-token:${TXGEN_GIT_TOKEN}@github.com/tempoxyz/txgen"
          install_args=(--git "$TXGEN_GIT_URL" --locked)
          if [ -n "$CODSPEED_PRE_BENCH_TXGEN_REF" ]; then
            TXGEN_REV="$(git ls-remote "$TXGEN_GIT_URL" "$CODSPEED_PRE_BENCH_TXGEN_REF" "refs/heads/$CODSPEED_PRE_BENCH_TXGEN_REF" "refs/tags/$CODSPEED_PRE_BENCH_TXGEN_REF" | awk 'BEGIN { rev = "" } /\^\{\}$/ { rev = $1; exit } rev == "" { rev = $1 } END { if (rev != "") print rev }')"
            install_args+=(--rev "${TXGEN_REV:-$CODSPEED_PRE_BENCH_TXGEN_REF}")
          fi

          cargo install "${install_args[@]}" txgen-tempo bench-cli
          echo "TXGEN_TEMPO_BIN=$CARGO_BIN_DIR/txgen-tempo" >> "$GITHUB_ENV"
          echo "TXGEN_BENCH_BIN=$CARGO_BIN_DIR/bench" >> "$GITHUB_ENV"
          command -v txgen-tempo
          command -v bench
      - name: Collect block artifacts
        run: |
          nu bench-e2e.nu codspeed-fixtures \
            --preset "$CODSPEED_PRE_BENCH_PRESET" \
            --bloat "$CODSPEED_PRE_BENCH_BLOAT" \
            --duration "$CODSPEED_PRE_BENCH_DURATION" \
            --tps "$CODSPEED_PRE_BENCH_TPS" \
            --accounts "$CODSPEED_PRE_BENCH_ACCOUNTS" \
            --max-concurrent-requests "$CODSPEED_PRE_BENCH_MAX_CONCURRENT_REQUESTS" \
            --gas-limit "$CODSPEED_PRE_BENCH_GAS_LIMIT" \
            --no-default-features \
            --features "$CODSPEED_PRE_BENCH_FEATURES" \
            --tune \
            --output-dir codspeed-prebench
      - name: Upload pre-bench artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codspeed-prebench-tip20
          path: codspeed-prebench/
          if-no-files-found: error
          retention-days: 7

  codspeed:
    name: CodSpeed microbenchmarks
    needs: pre-bench
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: Download pre-bench artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: codspeed-prebench-tip20
          path: codspeed-prebench
      - name: Export pre-bench artifact paths
        run: |
          {
            echo "TEMPO_CODSPEED_BLOCK_ACCESS_LISTS=$PWD/codspeed-prebench/block-access-lists.ndjson.gz"
            echo "TEMPO_CODSPEED_TRIE_WITNESSES=$PWD/codspeed-prebench/trie-witnesses.ndjson.gz"
            echo "TEMPO_CODSPEED_PREBENCH_MANIFEST=$PWD/codspeed-prebench/manifest.json"
          } >> "$GITHUB_ENV"
      - name: Install cargo-codspeed
        run: |
          cargo install cargo-codspeed \
            --git https://github.com/CodSpeedHQ/codspeed-rust \
            --rev 0c6ccae11dc48654fd83c8dd77d231e386ebd9bd \
            --locked
      - name: Resolve cargo codspeed arguments
        id: args
        env:
          INPUT_PACKAGES: ${{ inputs.packages || 'tempo-evm tempo-precompiles' }}
          INPUT_BENCHMARKS: ${{ inputs.benchmarks || '' }}
          INPUT_FILTERS: ${{ inputs.filters || '' }}
          INPUT_MEASUREMENT_MODES: ${{ inputs.measurement_modes || 'simulation' }}
        run: |
          set -euo pipefail

          split_words() {
            local value="$1"
            value="${value//,/ }"
            read -r -a words <<< "$value"
            printf '%s\n' "${words[@]}"
          }

          cargo_args=()
          while IFS= read -r package; do
            [ -n "$package" ] && cargo_args+=("-p" "$package")
          done < <(split_words "$INPUT_PACKAGES")

          while IFS= read -r benchmark; do
            [ -n "$benchmark" ] && cargo_args+=("--bench" "$benchmark")
          done < <(split_words "$INPUT_BENCHMARKS")

          # tempo-precompiles benchmarks require the test-utils feature;
          # --features is only valid for `cargo codspeed build`, not `run`.
          feature_args=()
          while IFS= read -r package; do
            if [ "$package" = "tempo-precompiles" ]; then
              feature_args+=("--features" "tempo-precompiles/test-utils")
              break
            fi
          done < <(split_words "$INPUT_PACKAGES")

          build_args=("${cargo_args[@]}" "${feature_args[@]}")
          while IFS= read -r mode; do
            [ -n "$mode" ] && build_args+=("-m" "$mode")
          done < <(split_words "$INPUT_MEASUREMENT_MODES")

          run_args=("${cargo_args[@]}")
          while IFS= read -r filter; do
            [ -n "$filter" ] && run_args+=("$filter")
          done < <(split_words "$INPUT_FILTERS")

          {
            printf 'build_args<<EOF\n'
            printf '%q ' "${build_args[@]}"
            printf '\nEOF\n'
            printf 'run_args<<EOF\n'
            printf '%q ' "${run_args[@]}"
            printf '\nEOF\n'
            printf 'measurement_modes<<EOF\n'
            printf '%s' "$INPUT_MEASUREMENT_MODES"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

          printf 'cargo codspeed build '
          printf '%q ' "${build_args[@]}"
          printf '\n'
          printf 'cargo codspeed run '
          printf '%q ' "${run_args[@]}"
          printf '\n'
      - name: Build benchmark target(s)
        run: cargo codspeed build ${{ steps.args.outputs.build_args }}
      - name: Run benchmark target(s)
        uses: CodSpeedHQ/action@c5e3fca5233fb854c7193713adfbe99d3910f8d2 # v4.15.1
        with:
          mode: ${{ steps.args.outputs.measurement_modes }}
          run: cargo codspeed run ${{ steps.args.outputs.run_args }}
