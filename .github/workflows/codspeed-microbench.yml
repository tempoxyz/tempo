name: CodSpeed microbenchmarks

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**/Cargo.toml"
      - "crates/primitives/**"
      - "crates/alloy/**"
      - "crates/precompiles/**"
      - "crates/revm/**"
      - "crates/evm/**"
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**/Cargo.toml"
      - "crates/primitives/**"
      - "crates/alloy/**"
      - "crates/precompiles/**"
      - "crates/revm/**"
      - "crates/evm/**"
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:
    inputs:
      packages:
        description: "Cargo package(s) containing benchmark targets, separated by spaces"
        required: true
        default: "tempo-evm"
        type: string
      benchmarks:
        description: "Cargo bench target(s), separated by spaces; leave empty for every bench in the package(s)"
        required: false
        default: "tip20_execution dex_execution"
        type: string
      filters:
        description: "Optional benchmark name filter passed to cargo codspeed run"
        required: false
        default: ""
        type: string
      measurement_modes:
        description: "CodSpeed measurement mode(s), separated by commas"
        required: true
        default: "simulation"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  codspeed:
    name: CodSpeed microbenchmarks
    runs-on: depot-ubuntu-latest-4
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable # zizmor: ignore[impostor-commit]
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Install cargo-codspeed
        run: |
          cargo install cargo-codspeed \
            --git https://github.com/CodSpeedHQ/codspeed-rust \
            --rev 0c6ccae11dc48654fd83c8dd77d231e386ebd9bd \
            --locked
      - name: Resolve cargo codspeed arguments
        id: args
        env:
          INPUT_PACKAGES: ${{ inputs.packages || 'tempo-evm' }}
          INPUT_BENCHMARKS: ${{ inputs.benchmarks || 'tip20_execution dex_execution' }}
          INPUT_FILTERS: ${{ inputs.filters }}
          INPUT_MEASUREMENT_MODES: ${{ inputs.measurement_modes || 'simulation' }}
        run: |
          set -euo pipefail

          split_words() {
            local value="$1"
            value="${value//,/ }"
            read -r -a words <<< "$value"
            printf '%s\n' "${words[@]}"
          }

          cargo_args=()
          while IFS= read -r package; do
            [ -n "$package" ] && cargo_args+=("-p" "$package")
          done < <(split_words "$INPUT_PACKAGES")

          while IFS= read -r benchmark; do
            [ -n "$benchmark" ] && cargo_args+=("--bench" "$benchmark")
          done < <(split_words "$INPUT_BENCHMARKS")

          # tempo-precompiles benchmarks require the test-utils feature;
          # --features is only valid for `cargo codspeed build`, not `run`.
          feature_args=()
          while IFS= read -r package; do
            if [ "$package" = "tempo-precompiles" ]; then
              feature_args+=("--features" "tempo-precompiles/test-utils")
              break
            fi
          done < <(split_words "$INPUT_PACKAGES")

          build_args=("${cargo_args[@]}" "${feature_args[@]}")
          while IFS= read -r mode; do
            [ -n "$mode" ] && build_args+=("-m" "$mode")
          done < <(split_words "$INPUT_MEASUREMENT_MODES")

          run_args=("${cargo_args[@]}")
          while IFS= read -r filter; do
            [ -n "$filter" ] && run_args+=("$filter")
          done < <(split_words "$INPUT_FILTERS")

          {
            printf 'build_args<<EOF\n'
            printf '%q ' "${build_args[@]}"
            printf '\nEOF\n'
            printf 'run_args<<EOF\n'
            printf '%q ' "${run_args[@]}"
            printf '\nEOF\n'
            printf 'measurement_modes<<EOF\n'
            printf '%s' "$INPUT_MEASUREMENT_MODES"
            printf '\nEOF\n'
          } >> "$GITHUB_OUTPUT"

          printf 'cargo codspeed build '
          printf '%q ' "${build_args[@]}"
          printf '\n'
          printf 'cargo codspeed run '
          printf '%q ' "${run_args[@]}"
          printf '\n'
      - name: Build benchmark target(s)
        env:
          BUILD_ARGS: ${{ steps.args.outputs.build_args }}
        run: |
          # shellcheck disable=SC2086  # BUILD_ARGS must word-split into multiple cargo args
          cargo codspeed build $BUILD_ARGS
      - name: Run benchmark target(s)
        uses: CodSpeedHQ/action@3194d9a39c4d46684cb44bf7207fc56626aad8fd # v4.15.1
        with:
          mode: ${{ steps.args.outputs.measurement_modes }}
          run: cargo codspeed run ${{ steps.args.outputs.run_args }}
