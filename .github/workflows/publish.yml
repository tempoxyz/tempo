name: Publish alloy crates

permissions: {}

on:
  pull_request:
    types: [closed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  publish:
    name: Publish
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changelog-release/')
    runs-on: depot-ubuntu-latest-4
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth

      - name: Publish crates via sanitize pipeline
        run: ./scripts/publish-crates.sh --publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
