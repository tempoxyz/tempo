name: Publish crates

permissions: {}

on:
  pull_request:
    types: [closed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"

jobs:
  publish:
    name: Publish
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'changelog-release/')
    runs-on: depot-ubuntu-latest-4
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      - name: Detect publish groups
        id: release-groups
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          alloy=false; revm=false
          echo "$files" | grep -qE '^crates/(contracts|primitives|alloy)/' && alloy=true
          echo "$files" | grep -qE '^crates/(chainspec|precompiles-macros|precompiles|revm)/' && revm=true
          echo "alloy=$alloy" >> "$GITHUB_OUTPUT"
          echo "revm=$revm" >> "$GITHUB_OUTPUT"
          if [ "$alloy" = "false" ] && [ "$revm" = "false" ]; then
            echo "No published crate groups detected in release PR." >&2; exit 1
          fi

      - name: Publish alloy crates via sanitize pipeline
        if: steps.release-groups.outputs.alloy == 'true'
        run: ./scripts/publish/publish.sh alloy --publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish revm stack crates via sanitize pipeline
        if: steps.release-groups.outputs.revm == 'true'
        run: ./scripts/publish/publish.sh revm --publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
