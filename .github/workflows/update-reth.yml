# Nightly workflow to update reth dependencies from upstream main branch.
#
# Checks out the `reth/main` branch (which has reth deps pointing at
# `branch = "main"`), runs `cargo update` to pull latest revisions,
# and uses Sourcegraph Amp to auto-fix any compilation / test breakage.
# Creates or updates a PR targeting `reth/main`.

name: Update reth deps

on:
  pull_request: # TODO: remove before merging
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-reth
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"
  TEMPO_MAINNET_RPC_URL: ${{ secrets.TEMPO_MAINNET_RPC_URL }}
  TEMPO_TESTNET_RPC_URL: ${{ secrets.TEMPO_TESTNET_RPC_URL }}
  TEMPO_DEVNET_RPC_URL: ${{ secrets.TEMPO_DEVNET_RPC_URL }}

jobs:
  update:
    name: Update reth dependencies
    runs-on: depot-ubuntu-latest-32
    timeout-minutes: 120
    steps:
      # ── checkout ───────────────────────────────────────────────
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.DEREK_PAT }}

      - name: Ensure reth/main branch exists
        run: |
          if git rev-parse --verify origin/reth/main >/dev/null 2>&1; then
            git checkout reth/main
          else
            echo "reth/main not found, creating from main"
            git checkout -b reth/main main
          fi

      # ── toolchain (matches test.yml) ───────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: taiki-e/install-action@3f67faa728964808f52294a9cd15561b15550b28 # v2.67.19
        with:
          tool: nextest@0.9.124

      # ── amp CLI ────────────────────────────────────────────────
      - name: Install Amp CLI
        run: npm install -g @sourcegraph/amp

      # ── git identity ───────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── merge latest main ────────────────────────────────────
      - name: Merge latest main
        id: merge-main
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          if git merge origin/main --no-edit; then
            echo "Merged main cleanly"
          else
            echo "Merge conflicts detected, using Amp to resolve..."
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            AMP_PROMPT="The branch reth/main has merge conflicts after merging origin/main. \
            Please resolve all merge conflicts in the following files. Keep the reth/main branch's \
            intent (reth deps pointing at branch = \"main\") while incorporating changes from main. \
            Conflicted files: ${CONFLICTED}"

            amp --dangerously-allow-all -x "$AMP_PROMPT"
            git add -A
            git commit --no-edit
          fi

      # ── PR branch ──────────────────────────────────────────────
      - name: Create PR branch
        run: git checkout -B reth-main-update-deps

      # ── cargo update ───────────────────────────────────────────
      - name: Update reth crates in lockfile
        id: update
        run: |
          # Capture old reth revision
          OLD_REV=$(grep -A2 'name = "reth-engine-tree"' Cargo.lock | grep 'source' | sed 's/.*#//')

          LOCK_BEFORE=$(sha256sum Cargo.lock | cut -d' ' -f1)
          cargo update -p reth-engine-tree
          LOCK_AFTER=$(sha256sum Cargo.lock | cut -d' ' -f1)

          if [ "$LOCK_BEFORE" = "$LOCK_AFTER" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No reth dependency changes detected — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"

            # Capture new reth revision
            NEW_REV=$(grep -A2 'name = "reth-engine-tree"' Cargo.lock | grep 'source' | sed 's/.*#//')
            echo "old_rev=$OLD_REV" >> "$GITHUB_OUTPUT"
            echo "new_rev=$NEW_REV" >> "$GITHUB_OUTPUT"
          fi

      # ── early exit if no changes ───────────────────────────────
      - name: Exit early if no updates
        if: steps.update.outputs.skip == 'true'
        run: echo "Lockfile unchanged — skipping remaining steps."

      # ── first commit (lockfile only) ───────────────────────────
      - name: Commit lockfile update
        if: steps.update.outputs.skip != 'true'
        run: |
          git add Cargo.lock
          git commit -m "chore(deps): update reth dependencies from main ($(date -u +%Y-%m-%d))"

      # ── cargo check + Amp fix loop ────────────────────────────
      - name: Fix compilation errors
        if: steps.update.outputs.skip != 'true'
        id: check-loop
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          AMP_PROMPT="This Rust workspace just had its reth dependencies updated to the latest commit \
          on the paradigmxyz/reth main branch. \`cargo check --workspace\` is now failing with compilation errors.

          Run \`cargo check --workspace\` to see the errors, then fix the Rust source code and repeat \
          until cargo check passes. You may also bump non-reth dependency versions in Cargo.toml files \
          if needed (e.g. revm, alloy), but do NOT modify the reth git source specifications (URL, branch, \
          or rev) in any Cargo.toml — those must stay pointing at branch = \"main\".

          IMPORTANT: Do NOT suppress warnings with #[allow(...)]. Instead, migrate the code \
          to use the new non-deprecated APIs. Look at the upstream reth source code to understand \
          what replaced the deprecated items."

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "::group::Amp attempt $attempt"
            amp --dangerously-allow-all -x "$AMP_PROMPT"
            echo "::endgroup::"

            echo "::group::Verify cargo check"
            set +e
            cargo check --workspace 2>&1
            check_exit=$?
            set -e
            echo "::endgroup::"

            if [ "$check_exit" -eq 0 ]; then
              echo "Cargo check passed after attempt $attempt"
              exit 0
            fi

            echo "Amp exited but cargo check still failing, retrying..."
          done

      # ── test compilation check + Amp fix loop ─────────────────
      - name: Fix test compilation errors
        if: steps.update.outputs.skip != 'true'
        id: test-loop
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          AMP_PROMPT="This Rust workspace just had its reth dependencies updated to the latest commit \
          on the paradigmxyz/reth main branch. Test compilation is failing.

          Run \`cargo nextest run --profile ci --no-run\` to build test binaries and see the compilation errors, \
          then fix the Rust source code and repeat until test binaries compile successfully. \
          Also run \`cargo check --workspace\` after fixes to catch compilation regressions. \
          You may also bump non-reth dependency versions in Cargo.toml files if needed (e.g. revm, alloy), \
          but do NOT modify the reth git source specifications (URL, branch, or rev) in any Cargo.toml — \
          those must stay pointing at branch = \"main\".

          IMPORTANT: Do NOT suppress warnings with #[allow(...)]. Instead, migrate the code \
          to use the new non-deprecated APIs. Look at the upstream reth source code to understand \
          what replaced the deprecated items."

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "::group::Amp attempt $attempt"
            amp --dangerously-allow-all -x "$AMP_PROMPT"
            echo "::endgroup::"

            echo "::group::Verify test compilation"
            set +e
            cargo nextest run --profile ci --no-run 2>&1
            test_exit=$?
            set -e
            echo "::endgroup::"

            if [ "$test_exit" -eq 0 ]; then
              echo "Tests compile after attempt $attempt"
              exit 0
            fi

            echo "Amp exited but test compilation still failing, retrying..."
          done

      # ── second commit (source fixes) ───────────────────────────
      - name: Commit source fixes
        if: steps.update.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix: resolve breaking changes from reth update ($(date -u +%Y-%m-%d))"
          else
            echo "No source changes to commit."
          fi

      # ── push ───────────────────────────────────────────────────
      - name: Push branches
        if: steps.update.outputs.skip != 'true'
        run: |
          # Ensure reth/main exists on remote (needed as PR base)
          git push -u origin reth/main 2>/dev/null || true
          git push --force-with-lease origin reth-main-update-deps

      # ── create / update PR ─────────────────────────────────────
      - name: Create or update PR
        if: steps.update.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.DEREK_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          OLD_REV="${{ steps.update.outputs.old_rev }}"
          NEW_REV="${{ steps.update.outputs.new_rev }}"
          TITLE="chore(deps): update reth from main ($DATE)"

          # Build PR body in a temp file to avoid shell quoting issues
          {
            echo "Automated nightly update of reth dependencies from \`paradigmxyz/reth\` main branch."
            echo ""
            echo "**reth**: [\`${OLD_REV:0:7}...${NEW_REV:0:7}\`](https://github.com/paradigmxyz/reth/compare/${OLD_REV}...${NEW_REV})"
            echo ""
            echo "**Workflow Run**: [${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""

            # Summarize source migrations using Amp
            SOURCE_DIFF=$(git diff HEAD~1 -- '*.rs' '*.toml' ':!Cargo.lock')
            if [ -n "$SOURCE_DIFF" ]; then
              echo "## Migrations"
              echo ""
              SUMMARY=$(echo "$SOURCE_DIFF" | amp -x "Summarize the following code changes as a concise markdown bullet list. \
                Each bullet should describe what was migrated and why (e.g. API rename, parameter change, removed method). \
                Do NOT include any preamble or explanation, just the bullet list.")
              echo "$SUMMARY"
            fi
          } > /tmp/pr-body.txt

          # Check for existing PR
          EXISTING_PR=$(gh pr list --head reth-main-update-deps --base reth/main --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body-file /tmp/pr-body.txt
          else
            echo "Creating new PR"
            gh pr create \
              --base reth/main \
              --head reth-main-update-deps \
              --title "$TITLE" \
              --body-file /tmp/pr-body.txt \
              --label A-dependencies
          fi

      # ── wait for CI and fix failures ─────────────────────────
      - name: Wait for CI and fix failures
        if: steps.update.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.DEREK_PAT }}
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          PR_BRANCH="reth-main-update-deps"

          while true; do
            echo "Waiting for CI checks to complete..."
            # Wait for all checks to finish (poll every 60s)
            while true; do
              STATUS=$(gh pr checks "$PR_BRANCH" --json bucket,name,state 2>&1) || true
              PENDING=$(echo "$STATUS" | jq -r '[.[] | select(.state == "PENDING" or .state == "QUEUED" or .state == "IN_PROGRESS")] | length')
              if [ "$PENDING" = "0" ] 2>/dev/null; then
                break
              fi
              echo "CI still running ($PENDING checks pending)..."
              sleep 60
            done

            # Check for failures
            FAILED=$(echo "$STATUS" | jq -r '[.[] | select(.state == "FAILURE" or .state == "ERROR")] | .[].name' 2>/dev/null || true)
            if [ -z "$FAILED" ]; then
              echo "All CI checks passed!"
              exit 0
            fi

            echo "Failed checks: $FAILED"

            # Fetch logs for failed checks
            FAILED_LOGS=""
            for check in $FAILED; do
              echo "Fetching logs for $check..."
              LOGS=$(gh run view --repo "${{ github.repository }}" -j "$check" --log-failed 2>&1 | tail -200) || true
              FAILED_LOGS="${FAILED_LOGS}

          === ${check} ===
          ${LOGS}"
            done

            # Use Amp to fix
            AMP_PROMPT="The CI checks on this PR are failing. Please fix the issues. \
            You may also bump non-reth dependency versions in Cargo.toml files if needed (e.g. revm, alloy), \
            but do NOT modify the reth git source specifications (URL, branch, or rev) in any Cargo.toml — \
            those must stay pointing at branch = \"main\".

            IMPORTANT: Do NOT suppress warnings with #[allow(...)]. Instead, migrate the code \
            to use the new non-deprecated APIs. Look at the upstream reth source code to understand \
            what replaced the deprecated items.

            Here are the CI failure logs:

            ${FAILED_LOGS}"

            echo "::group::Amp CI fix"
            amp --dangerously-allow-all -x "$AMP_PROMPT"
            echo "::endgroup::"

            # Commit and push fixes
            if [ -n "$(git status --porcelain)" ]; then
              git add -A
              git commit -m "fix: resolve CI failures from reth update ($(date -u +%Y-%m-%d))"
              git push origin "$PR_BRANCH"
            else
              echo "Amp made no changes but CI is still failing — giving up"
              exit 1
            fi
          done

