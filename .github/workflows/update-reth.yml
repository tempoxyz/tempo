# Nightly workflow to update reth dependencies from upstream main branch.
#
# Checks out the `reth/main` branch (which has reth deps pointing at
# `branch = "main"`), runs `cargo update` to pull latest revisions,
# and uses Sourcegraph Amp to auto-fix any compilation / test breakage.
# Creates or updates a PR targeting `reth/main`.

name: Update reth deps

on:
  pull_request: # TODO: remove before merging
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-reth
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTC_WRAPPER: "sccache"
  TEMPO_MAINNET_RPC_URL: ${{ secrets.TEMPO_MAINNET_RPC_URL }}
  TEMPO_TESTNET_RPC_URL: ${{ secrets.TEMPO_TESTNET_RPC_URL }}
  TEMPO_DEVNET_RPC_URL: ${{ secrets.TEMPO_DEVNET_RPC_URL }}

jobs:
  update:
    name: Update reth dependencies
    runs-on: depot-ubuntu-latest-32
    timeout-minutes: 120
    steps:
      # ── checkout ───────────────────────────────────────────────
      - uses: actions/checkout@v6
        with:
          ref: reth/main
          fetch-depth: 0
          token: ${{ secrets.DEREK_PAT }}

      # ── toolchain (matches test.yml) ───────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@725a8794d15fc7563f59595bd9556495c0564878 # v1
      - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: taiki-e/install-action@3f67faa728964808f52294a9cd15561b15550b28 # v2.67.19
        with:
          tool: nextest@0.9.124

      # ── amp CLI ────────────────────────────────────────────────
      - name: Install Amp CLI
        run: npm install -g @sourcegraph/amp

      # ── git identity ───────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── PR branch ──────────────────────────────────────────────
      - name: Create PR branch
        run: git checkout -B reth-main-update-deps

      # ── cargo update ───────────────────────────────────────────
      - name: Update reth crates in lockfile
        id: update
        run: |
          LOCK_BEFORE=$(sha256sum Cargo.lock | cut -d' ' -f1)
          cargo update -p reth-engine-tree
          LOCK_AFTER=$(sha256sum Cargo.lock | cut -d' ' -f1)

          if [ "$LOCK_BEFORE" = "$LOCK_AFTER" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No reth dependency changes detected — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            # Capture lockfile diff for the PR body (first 200 lines)
            git diff Cargo.lock | head -200 > /tmp/lockfile-diff.txt
          fi

      # ── early exit if no changes ───────────────────────────────
      - name: Exit early if no updates
        if: steps.update.outputs.skip == 'true'
        run: echo "Lockfile unchanged — skipping remaining steps."

      # ── first commit (lockfile only) ───────────────────────────
      - name: Commit lockfile update
        if: steps.update.outputs.skip != 'true'
        run: |
          git add Cargo.lock
          git commit -m "chore(deps): update reth dependencies from main ($(date -u +%Y-%m-%d))"

      # ── cargo check + Amp fix loop ────────────────────────────
      - name: Fix compilation errors
        if: steps.update.outputs.skip != 'true'
        id: check-loop
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          AMP_PROMPT="This Rust workspace just had its reth dependencies updated to the latest commit \
          on the paradigmxyz/reth main branch. \`cargo check --workspace\` is now failing with compilation errors.

          Run \`cargo check --workspace\` to see the errors, then fix the Rust source code and repeat \
          until cargo check passes. You may also bump non-reth dependency versions in Cargo.toml files \
          if needed (e.g. revm, alloy), but do NOT modify the reth git source specifications (URL, branch, \
          or rev) in any Cargo.toml — those must stay pointing at branch = \"main\".

          IMPORTANT: Do NOT suppress warnings with #[allow(...)]. Instead, migrate the code \
          to use the new non-deprecated APIs. Look at the upstream reth source code to understand \
          what replaced the deprecated items."

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "::group::Amp attempt $attempt"
            amp --dangerously-allow-all -x "$AMP_PROMPT"
            echo "::endgroup::"

            echo "::group::Verify cargo check"
            set +e
            cargo check --workspace 2>&1
            check_exit=$?
            set -e
            echo "::endgroup::"

            if [ "$check_exit" -eq 0 ]; then
              echo "Cargo check passed after attempt $attempt"
              exit 0
            fi

            echo "Amp exited but cargo check still failing, retrying..."
          done

      # ── test + Amp fix loop ────────────────────────────────────
      - name: Fix test failures
        if: steps.update.outputs.skip != 'true'
        id: test-loop
        env:
          AMP_API_KEY: ${{ secrets.AMP_API_KEY }}
        run: |
          AMP_PROMPT="This Rust workspace just had its reth dependencies updated to the latest commit \
          on the paradigmxyz/reth main branch. Tests are now failing.

          Run \`cargo nextest run --profile ci\` to see the failures, then fix the Rust source code and repeat \
          until all tests pass. Also run \`cargo check --workspace\` after fixes to catch compilation regressions. \
          You may also bump non-reth dependency versions in Cargo.toml files if needed (e.g. revm, alloy), \
          but do NOT modify the reth git source specifications (URL, branch, or rev) in any Cargo.toml — \
          those must stay pointing at branch = \"main\".

          IMPORTANT: Do NOT suppress warnings with #[allow(...)]. Instead, migrate the code \
          to use the new non-deprecated APIs. Look at the upstream reth source code to understand \
          what replaced the deprecated items."

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            echo "::group::Amp attempt $attempt"
            amp --dangerously-allow-all -x "$AMP_PROMPT"
            echo "::endgroup::"

            echo "::group::Verify cargo check"
            set +e
            cargo check --workspace 2>&1
            check_exit=$?
            set -e
            echo "::endgroup::"

            if [ "$check_exit" -ne 0 ]; then
              echo "Amp exited but cargo check failing, retrying..."
              continue
            fi

            echo "::group::Verify tests"
            set +e
            cargo nextest run --profile ci 2>&1
            test_exit=$?
            set -e
            echo "::endgroup::"

            if [ "$test_exit" -eq 0 ]; then
              echo "Tests passed after attempt $attempt"
              exit 0
            fi

            echo "Amp exited but tests still failing, retrying..."
          done

      # ── second commit (source fixes) ───────────────────────────
      - name: Commit source fixes
        if: steps.update.outputs.skip != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "fix: resolve breaking changes from reth update ($(date -u +%Y-%m-%d))"
          else
            echo "No source changes to commit."
          fi

      # ── push ───────────────────────────────────────────────────
      - name: Push branch
        if: steps.update.outputs.skip != 'true'
        run: git push --force-with-lease origin reth-main-update-deps

      # ── create / update PR ─────────────────────────────────────
      - name: Create or update PR
        if: steps.update.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.DEREK_PAT }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TITLE="chore(deps): update reth from main ($DATE)"

          # Build PR body in a temp file to avoid shell quoting issues
          {
            echo "Automated nightly update of reth dependencies from \`paradigmxyz/reth\` main branch."
            echo ""

            echo "> [!TIP]"
            echo "> Cargo check and tests passed successfully."
            echo ""

            echo "> [!WARNING]"
            echo "> This PR may contain AI-generated source changes. Please review carefully."
            echo ""

            if [ -f /tmp/lockfile-diff.txt ]; then
              echo "<details>"
              echo "<summary>Lockfile diff (first 200 lines)</summary>"
              echo ""
              echo '```diff'
              cat /tmp/lockfile-diff.txt
              echo '```'
              echo ""
              echo "</details>"
            fi
          } > /tmp/pr-body.txt

          # Check for existing PR
          EXISTING_PR=$(gh pr list --head reth-main-update-deps --base reth/main --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body-file /tmp/pr-body.txt
          else
            echo "Creating new PR"
            gh pr create \
              --base reth/main \
              --head reth-main-update-deps \
              --title "$TITLE" \
              --body-file /tmp/pr-body.txt \
              --label A-dependencies
          fi
