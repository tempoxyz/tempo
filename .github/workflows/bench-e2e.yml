# E2E benchmark job (2-validator consensus).
#
# Called by bench.yml when mode=e2e. Runs two Tempo validators on separate
# bare-metal runners in real consensus. Both nodes build and validate blocks,
# exercising engine validation on peer-built blocks.
#
# Workflow DAG:
#   prepare → baseline-1-{a,b} → feature-1-{a,b} → feature-2-{a,b} → baseline-2-{a,b} → aggregate
#
# State (genesis + bloat + db) is pre-generated on each runner out-of-band
# and persisted via schelk. Phase jobs only recover the snapshot.
#
# Runner-specific config is set as persistent env vars on each runner:
#   BENCH_E2E_NODE_DIR       — path to this runner's validator dir
#   BENCH_E2E_GENESIS        — path to genesis.json on schelk
#   BENCH_E2E_TRUSTED_PEERS  — trusted peers enode string
#   BENCH_E2E_CONSENSUS_PORT — consensus listen port
#   BENCH_E2E_PEER_URL       — peer node's RPC URL

name: bench-e2e

on:
  workflow_call:
    inputs:
      pr:
        type: string
        required: false
      actor:
        type: string
        required: true
      mode:
        type: string
        required: true
      preset:
        type: string
        required: true
      duration:
        type: string
        required: true
      bloat:
        type: string
        required: true
      tps:
        type: string
        required: true
      baseline:
        type: string
        required: true
      feature:
        type: string
        required: true
      baseline-name:
        type: string
        required: true
      feature-name:
        type: string
        required: true
      run-type:
        type: string
        required: true
      no-slack:
        type: string
        required: true
      bench-args:
        type: string
        required: false
      comment-id:
        type: string
        required: false
    secrets:
      DEREK_PAT:
        required: false
      SLACK_BENCH_BOT_TOKEN:
        required: false
      SLACK_BENCH_CHANNEL:
        required: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: "sccache"

# Only one e2e bench can run at a time (shared runner pair)
concurrency:
  group: bench-e2e
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  # ----------------------------------------------------------------
  # Prepare: resolve refs to SHAs, emit shared metadata
  # ----------------------------------------------------------------
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      baseline-sha: ${{ steps.refs.outputs.baseline-sha }}
      feature-sha: ${{ steps.refs.outputs.feature-sha }}
      benchmark-id: ${{ steps.meta.outputs.benchmark-id }}
      reference-epoch: ${{ steps.meta.outputs.reference-epoch }}
      checkout-ref: ${{ steps.checkout-ref.outputs.ref }}
    steps:
      - name: Resolve checkout ref
        id: checkout-ref
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const pr = '${{ inputs.pr }}';
            if (!pr) {
              core.setOutput('ref', '${{ github.ref }}');
              return;
            }
            const { data: prData } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt(pr),
            });
            if (prData.state !== 'open' || !prData.mergeable) {
              core.setOutput('ref', prData.head.sha);
            } else {
              core.setOutput('ref', `refs/pull/${pr}/merge`);
            }

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.checkout-ref.outputs.ref }}

      - name: Resolve refs to SHAs
        id: refs
        env:
          INPUT_BASELINE: ${{ inputs.baseline }}
          INPUT_FEATURE: ${{ inputs.feature }}
          INPUT_PR: ${{ inputs.pr }}
        run: |
          baseline="${INPUT_BASELINE:-main}"
          if [ -z "$INPUT_FEATURE" ]; then
            feature="refs/pull/${INPUT_PR}/head"
            git fetch origin "$feature" --quiet
          else
            feature="$INPUT_FEATURE"
          fi
          baseline_sha=$(git rev-parse "$baseline")
          feature_sha=$(git rev-parse "$feature")
          echo "baseline-sha=$baseline_sha" >> "$GITHUB_OUTPUT"
          echo "feature-sha=$feature_sha" >> "$GITHUB_OUTPUT"
          echo "Baseline: $baseline → $baseline_sha"
          echo "Feature: $feature → $feature_sha"

      - name: Generate benchmark metadata
        id: meta
        run: |
          echo "benchmark-id=bench-e2e-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "reference-epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Update status (running)
        if: inputs.comment-id
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const config = `**Config:** mode: \`e2e\`, preset: \`${{ inputs.preset }}\`, duration: \`${{ inputs.duration }}s\`, bloat: \`${{ inputs.bloat }} MiB\`, tps: \`${{ inputs.tps }}\`, baseline: \`${{ inputs.baseline-name }}\`, feature: \`${{ inputs.feature-name }}\``;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt('${{ inputs.comment-id }}'),
              body: `cc @${{ inputs.actor }}\n\n🚀 E2E Benchmark running! [View run](${runUrl})\n\n⏳ **Status:** Running baseline-1...\n\n${config}`,
            });

  # ----------------------------------------------------------------
  # Phase pairs: B-F-F-B interleaved
  # Each pair runs both runners concurrently, next pair waits for both.
  # Runner A runs tempo-bench (txgen), runner B runs node only.
  # ----------------------------------------------------------------

  # --- Baseline 1 ---
  baseline-1-a:
    needs: [prepare]
    name: baseline-1-a
    runs-on: [self-hosted, Linux, X64, bench-a]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.baseline-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role a --phase baseline-1 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune ${{ inputs.bench-args && format('--bench-args="{0}"', inputs.bench-args) || '' }}
      - name: Upload results
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: e2e-baseline-1-a
          path: bench-results/

  baseline-1-b:
    needs: [prepare]
    name: baseline-1-b
    runs-on: [self-hosted, Linux, X64, bench-b]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.baseline-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role b --phase baseline-1 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune

  # --- Feature 1 ---
  feature-1-a:
    needs: [prepare, baseline-1-a, baseline-1-b]
    name: feature-1-a
    runs-on: [self-hosted, Linux, X64, bench-a]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.feature-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role a --phase feature-1 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune ${{ inputs.bench-args && format('--bench-args="{0}"', inputs.bench-args) || '' }}
      - name: Upload results
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: e2e-feature-1-a
          path: bench-results/

  feature-1-b:
    needs: [prepare, baseline-1-a, baseline-1-b]
    name: feature-1-b
    runs-on: [self-hosted, Linux, X64, bench-b]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.feature-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role b --phase feature-1 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune

  # --- Feature 2 ---
  feature-2-a:
    needs: [prepare, feature-1-a, feature-1-b]
    name: feature-2-a
    runs-on: [self-hosted, Linux, X64, bench-a]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.feature-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role a --phase feature-2 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune ${{ inputs.bench-args && format('--bench-args="{0}"', inputs.bench-args) || '' }}
      - name: Upload results
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: e2e-feature-2-a
          path: bench-results/

  feature-2-b:
    needs: [prepare, feature-1-a, feature-1-b]
    name: feature-2-b
    runs-on: [self-hosted, Linux, X64, bench-b]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.feature-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role b --phase feature-2 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune

  # --- Baseline 2 ---
  baseline-2-a:
    needs: [prepare, feature-2-a, feature-2-b]
    name: baseline-2-a
    runs-on: [self-hosted, Linux, X64, bench-a]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.baseline-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role a --phase baseline-2 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune ${{ inputs.bench-args && format('--bench-args="{0}"', inputs.bench-args) || '' }}
      - name: Upload results
        if: "!cancelled()"
        uses: actions/upload-artifact@v4
        with:
          name: e2e-baseline-2-a
          path: bench-results/

  baseline-2-b:
    needs: [prepare, feature-2-a, feature-2-b]
    name: baseline-2-b
    runs-on: [self-hosted, Linux, X64, bench-b]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout-ref }}
      - name: Run phase
        env:
          BENCH_REF: ${{ needs.prepare.outputs.baseline-sha }}
          BENCH_BENCHMARK_ID: ${{ needs.prepare.outputs.benchmark-id }}
          BENCH_REFERENCE_EPOCH: ${{ needs.prepare.outputs.reference-epoch }}
        run: |
          nu tempo.nu bench-consensus-phase \
            --role b --phase baseline-2 --ref "$BENCH_REF" \
            --peer-url "$BENCH_E2E_PEER_URL" \
            --preset "${{ inputs.preset }}" --tps "${{ inputs.tps }}" \
            --duration "${{ inputs.duration }}" --bloat "${{ inputs.bloat }}" \
            --bench-datadir "$BENCH_E2E_NODE_DIR" --node-dir "$BENCH_E2E_NODE_DIR" \
            --genesis "$BENCH_E2E_GENESIS" --trusted-peers "$BENCH_E2E_TRUSTED_PEERS" \
            --consensus-port "$BENCH_E2E_CONSENSUS_PORT" \
            --benchmark-id "$BENCH_BENCHMARK_ID" --reference-epoch "$BENCH_REFERENCE_EPOCH" \
            --tune

  # ----------------------------------------------------------------
  # Aggregate: download phase artifacts, post results to PR
  # ----------------------------------------------------------------
  aggregate:
    needs: [prepare, baseline-1-a, baseline-1-b, feature-1-a, feature-1-b, feature-2-a, feature-2-b, baseline-2-a, baseline-2-b]
    name: aggregate
    runs-on: ubuntu-latest
    if: always() && needs.prepare.result == 'success'
    steps:
      - name: Download all phase artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-*
          path: bench-results/
          merge-multiple: true

      - name: Post results to PR
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const fs = require('fs');
            const phases = ['baseline-1', 'feature-1', 'feature-2', 'baseline-2'];
            const phaseResults = {
              'baseline-1': '${{ needs.baseline-1-a.result }}',
              'feature-1': '${{ needs.feature-1-a.result }}',
              'feature-2': '${{ needs.feature-2-a.result }}',
              'baseline-2': '${{ needs.baseline-2-a.result }}',
            };

            const lines = ['## E2E Benchmark Results\n'];
            lines.push(`**Baseline:** \`${{ inputs.baseline-name }}\` (\`${{ needs.prepare.outputs.baseline-sha }}\`)`);
            lines.push(`**Feature:** \`${{ inputs.feature-name }}\` (\`${{ needs.prepare.outputs.feature-sha }}\`)`);
            lines.push(`**Benchmark ID:** \`${{ needs.prepare.outputs.benchmark-id }}\`\n`);
            lines.push('| Phase | Status |');
            lines.push('|-------|--------|');
            for (const phase of phases) {
              const result = phaseResults[phase];
              const icon = result === 'success' ? '✅' : result === 'skipped' ? '⏭️' : '❌';
              lines.push(`| ${phase} | ${icon} ${result} |`);
            }

            // Try to read report files
            for (const phase of phases) {
              const reportPath = `bench-results/${phase}/report-${phase}.json`;
              try {
                const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                if (report.summary) {
                  lines.push(`\n### ${phase}\n`);
                  lines.push('```');
                  lines.push(JSON.stringify(report.summary, null, 2));
                  lines.push('```');
                }
              } catch (e) {}
            }

            const allSuccess = Object.values(phaseResults).every(r => r === 'success');
            const jobUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const icon = allSuccess ? '✅' : '❌';
            const status = allSuccess ? 'complete' : 'finished with failures';
            const body = `cc @${{ inputs.actor }}\n\n${icon} E2E Benchmark ${status}! [View run](${jobUrl})\n\n${lines.join('\n')}`;

            const commentId = '${{ inputs.comment-id }}';
            if (commentId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: parseInt(commentId),
                body,
              });
            } else {
              await core.summary.addRaw(body).write();
            }

      - name: Update status (cancelled)
        if: cancelled() && inputs.comment-id
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.DEREK_PAT }}
          script: |
            const jobUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt('${{ inputs.comment-id }}'),
              body: `cc @${{ inputs.actor }}\n\n⚠️ E2E benchmark cancelled. [View logs](${jobUrl})`,
            });
