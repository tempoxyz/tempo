name: Conformance Fixtures

on:
  pull_request:
    paths:
      - ".github/workflows/conformance-fixtures.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "fixtures/**"

jobs:
  check-fixtures:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout tempo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build fuzz harness shared object
        run: cargo build -p tempo-fuzz-harness --release --lib

      - name: Check block conformance fixtures
        run: cargo run -p tempo-fuzz-harness --release --bin conformance-fixtures -- fixtures/block
